<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 BacBo Analytics - Monitor 24/7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: #16213e !important;
            border-bottom: 2px solid #0f3460;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-header {
            background: #0f3460;
            color: #fff;
            border-bottom: none;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        .stat-label {
            color: #aaa;
            font-size: 0.9em;
        }
        .player-color { color: #ff4444; }
        .banker-color { color: #4444ff; }
        .tie-color { color: #ffaa00; }
        .table {
            color: #fff;
        }
        .table thead th {
            border-bottom-color: #0f3460;
            color: #aaa;
        }
        .table td {
            border-color: #0f3460;
        }
        .badge-player {
            background: #ff4444;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .badge-banker {
            background: #4444ff;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .badge-tie {
            background: #ffaa00;
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .prediction-box {
            background: #0f3460;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 10px 0;
        }
        .prediction-cor {
            font-size: 4em;
            margin: 10px 0;
        }
        .progress {
            background: #1a1a2e;
            height: 25px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #00ff00, #00aa00);
        }
        .update-time {
            color: #aaa;
            font-size: 0.8em;
        }
        .btn-period {
            background: #16213e;
            color: #fff;
            border: 1px solid #0f3460;
            margin: 2px;
        }
        .btn-period.active {
            background: #0f3460;
            border-color: #00ff00;
        }
        .btn-period:hover {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-dice-6"></i> BacBo Analytics - Monitor 24/7
            </span>
            <span class="text-light update-time" id="updateTime">
                <i class="bi bi-clock-history"></i> Atualizando...
            </span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Cards de Resumo -->
        <div class="row" id="resumoCards">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="stat-label">Total (72h)</div>
                        <div class="stat-value" id="totalRodadas">-</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="stat-label">Player</div>
                        <div class="stat-value player-color" id="playerPct">-</div>
                        <div id="playerCount" class="stat-label">- rodadas</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="stat-label">Banker</div>
                        <div class="stat-value banker-color" id="bankerPct">-</div>
                        <div id="bankerCount" class="stat-label">- rodadas</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="stat-label">Tie</div>
                        <div class="stat-value tie-color" id="tiePct">-</div>
                        <div id="tieCount" class="stat-label">- rodadas</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Previsão -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-graph-up-arrow"></i> PREVISÃO DA PRÓXIMA RODADA
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="prediction-box">
                                    <div class="stat-label">MODO</div>
                                    <div style="font-size: 2em;" id="modoAlgoritmo">-</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="prediction-box">
                                    <div class="stat-label">PRÓXIMA COR</div>
                                    <div class="prediction-cor" id="proximaCor">⚪</div>
                                    <div style="font-size: 1.5em;" id="proximaCorTexto">AGUARDANDO</div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="prediction-box">
                                    <div class="stat-label">CONFIANÇA</div>
                                    <div style="font-size: 2em;" id="confianca">0%</div>
                                    <div class="progress mt-2">
                                        <div class="progress-bar" id="confiancaBar" style="width: 0%"></div>
                                    </div>
                                    <div class="mt-2" id="delayWarning"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-bar-chart"></i> TENDÊNCIA (Últimas 20)
                    </div>
                    <div class="card-body">
                        <canvas id="tendenciaChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-table"></i> HISTÓRICO
                        <div class="btn-group float-end" role="group">
                            <button type="button" class="btn btn-period btn-sm active" onclick="carregarTabela(1)">1h</button>
                            <button type="button" class="btn btn-period btn-sm" onclick="carregarTabela(6)">6h</button>
                            <button type="button" class="btn btn-period btn-sm" onclick="carregarTabela(12)">12h</button>
                            <button type="button" class="btn btn-period btn-sm" onclick="carregarTabela(24)">24h</button>
                            <button type="button" class="btn btn-period btn-sm" onclick="carregarTabela(48)">48h</button>
                            <button type="button" class="btn btn-period btn-sm" onclick="carregarTabela(72)">72h</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive" style="max-height: 400px;">
                            <table class="table table-dark table-hover">
                                <thead>
                                    <tr>
                                        <th>Data/Hora</th>
                                        <th>Player</th>
                                        <th>Banker</th>
                                        <th>Resultado</th>
                                        <th>Mult.</th>
                                        <th>Ganhadores</th>
                                        <th>Prêmio</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaBody">
                                    <tr><td colspan="7" class="text-center">Carregando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tendenciaChart = null;

        function atualizarDados() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    if (data.ultima_atualizacao) {
                        document.getElementById('updateTime').innerHTML = 
                            `<i class="bi bi-clock-history"></i> ${data.ultima_atualizacao}`;
                    }

                    if (data.resumo && data.resumo['72h']) {
                        const r = data.resumo['72h'];
                        document.getElementById('totalRodadas').innerText = r.total;
                        document.getElementById('playerPct').innerText = r.player_pct + '%';
                        document.getElementById('playerCount').innerText = r.player + ' rodadas';
                        document.getElementById('bankerPct').innerText = r.banker_pct + '%';
                        document.getElementById('bankerCount').innerText = r.banker + ' rodadas';
                        document.getElementById('tiePct').innerText = r.tie_pct + '%';
                        document.getElementById('tieCount').innerText = r.tie + ' rodadas';
                    }

                    if (data.previsao) {
                        const p = data.previsao;
                        document.getElementById('modoAlgoritmo').innerText = p.modo;
                        
                        let simbolo = '⚪', texto = 'INDEFINIDO';
                        if (p.previsao === 'PLAYER') { simbolo = '🔴'; texto = 'PLAYER'; }
                        else if (p.previsao === 'BANKER') { simbolo = '⚫'; texto = 'BANKER'; }
                        
                        document.getElementById('proximaCor').innerHTML = simbolo;
                        document.getElementById('proximaCorTexto').innerHTML = texto;
                        document.getElementById('confianca').innerHTML = p.confianca + '%';
                        document.getElementById('confiancaBar').style.width = p.confianca + '%';
                        
                        if (p.delay_ativo) {
                            document.getElementById('delayWarning').innerHTML = 
                                '<span class="badge bg-warning text-dark">⚠️ DELAY PÓS-EMPATE</span>';
                        } else {
                            document.getElementById('delayWarning').innerHTML = '';
                        }
                    }

                    if (data.ultimas_20 && data.ultimas_20.length > 0) {
                        const ctx = document.getElementById('tendenciaChart').getContext('2d');
                        
                        const labels = data.ultimas_20.map(r => r.hora);
                        const playerData = data.ultimas_20.map(r => r.resultado === 'PLAYER' ? 1 : 0);
                        const bankerData = data.ultimas_20.map(r => r.resultado === 'BANKER' ? 1 : 0);
                        
                        if (tendenciaChart) tendenciaChart.destroy();
                        
                        tendenciaChart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [
                                    { label: 'PLAYER', data: playerData, borderColor: '#ff4444', tension: 0.3 },
                                    { label: 'BANKER', data: bankerData, borderColor: '#4444ff', tension: 0.3 }
                                ]
                            },
                            options: {
                                responsive: true,
                                plugins: { legend: { labels: { color: '#fff' } } },
                                scales: {
                                    y: { beginAtZero: true, max: 1, ticks: { color: '#aaa' } },
                                    x: { ticks: { color: '#aaa' } }
                                }
                            }
                        });
                    }
                });
        }

        function carregarTabela(horas) {
            document.querySelectorAll('.btn-period').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('tabelaBody').innerHTML = 
                '<tr><td colspan="7" class="text-center">Carregando...</td></tr>';
            
            fetch(`/api/tabela/${horas}`)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.forEach(r => {
                        html += `<tr>
                            <td>${r.data}</td>
                            <td class="player-color">${r.player}</td>
                            <td class="banker-color">${r.banker}</td>
                            <td><span class="badge-${r.resultado.toLowerCase()}">${r.cor} ${r.resultado}</span></td>
                            <td>${r.mult}</td>
                            <td>${r.winners}</td>
                            <td>${r.premio}</td>
                        </tr>`;
                    });
                    
                    if (data.length === 0) {
                        html = '<tr><td colspan="7" class="text-center">Nenhuma rodada</td></tr>';
                    }
                    
                    document.getElementById('tabelaBody').innerHTML = html;
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            atualizarDados();
            carregarTabela(72);
            setInterval(atualizarDados, 10000);
        });
    </script>
</body>
</html>
